<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArellanoBlocker</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#gradient)" stroke-width="3"/>
          <path d="M12 20L18 26L28 14" stroke="url(#gradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="gradient" x1="0" y1="0" x2="40" y2="40">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="title">
          <h1>ArellanoBlocker</h1>
          <span class="subtitle">Reklam Koruma</span>
        </div>
      </div>
      <div class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span>Aktif</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon blocked">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="blocked-count">0</span>
          <span class="stat-label">Engellenen</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon tracking">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="tracking-count">0</span>
          <span class="stat-label">Takipçi</span>
        </div>
      </div>
    </div>

    <div class="toggle-card">
      <div class="toggle-info">
        <span class="toggle-title">Koruma</span>
        <span class="toggle-desc">Reklamları ve takipçileri engelle</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="enable-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="picker-section">
      <div class="picker-card">
        <div class="picker-info">
          <span class="picker-title">🎯 Üzerine Gel</span>
          <span class="picker-desc">Reklamın üzerine gel, ✕ butonuna tıkla</span>
        </div>
        <button class="btn-picker" id="hover-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 15l6 6m-11-4a7 7 0 110-14 7 7 0 010 14z"/>
          </svg>
        </button>
      </div>
      
      <div class="picker-card">
        <div class="picker-info">
          <span class="picker-title">👆 Tıkla ve Seç</span>
          <span class="picker-desc">Reklamın üzerine tıkla</span>
        </div>
        <button class="btn-picker" id="picker-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="custom-rules" id="custom-rules" style="display: none;">
      <div class="rules-header">
        <span>Özel Kurallar</span>
        <span id="rules-count">0</span>
      </div>
      <div class="rules-list" id="rules-list"></div>
      <button class="btn btn-small" id="clear-rules">Tümünü Temizle</button>
    </div>

    <div class="toggle-card">
      <div class="toggle-info">
        <span class="toggle-title">Koyu Tema</span>
        <span class="toggle-desc">Açık / Koyu mod</span>
      </div>
      <label class="switch">
        <input type="checkbox" id="theme-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="refresh-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
        Güncelle
      </button>
      
    </div>

    <div class="footer">
      <span>v2.2</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
